<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img.png" type="image/x-icon">
    <script async src="dash.js"></script>
    <title>Diario da Obra</title>
</head>

<body class="light-mode-variables">


    <div class="container">


        <main>

            <div class="header">

                <div style="display: flex; align-items: center; gap: 1vw;">

                    <img src="./img/logo.png" alt="">
                    <!-- <h1>Olá, Ailton</h1> -->

                </div>


                <div class="datas">

                    <div>

                        <label>Planejado:</label>

                        <select id="tempo_obra">
                            <option value="90">90 dias</option>
                            <option value="30">30 dias</option>
                            <option value="60">60 dias</option>
                            <option value="120">120 dias</option>
                        </select>

                    </div>

                    <div>


                        <label>Obra: </label>

                        <select id="obra">

                            <option value="Restinga">Cidade Jardim</option>
                            <option value="Jardim_arizona">Jardim Arizona</option>


                        </select>

                    </div>

                    <div class="dark-mode">

                        <span class="material-symbols-outlined active">
                            brightness_medium
                        </span>

                    </div>

                </div>


            </div>


            <div class="analyse">

                <div class="card_kpi">

                    <div class="kpi_header">

                        <h3>Inicio Da Obra</h3>

                        <span class="material-symbols-outlined" id="inicio">
                            date_range
                        </span>


                    </div>


                    <h1 id="data_inicio">01/01/2026</h1>



                </div>


                <div class="card_kpi">

                    <div class="kpi_header">

                        <h3>Tempo De Obra</h3>

                        <span class="material-symbols-outlined" id="tempo">calendar_clock</span>


                    </div>

                    <h1 id="tempo_obra_escolhido">50</h1>

                </div>

                <div class="card_kpi">

                    <div class="kpi_header">

                        <h3>Qtd Dias Corridos</h3>

                        <span class="material-symbols-outlined">alarm</span>

                    </div>


                    <h1 id="qtd_dias_corridos">0</h1>

                </div>

                <div class="card_kpi">


                    <div class="kpi_header">

                        <h3>Qtd Dias Trabalhados</h3>

                        <span class="material-symbols-outlined" id="construcao">construction</span>

                    </div>


                    <h1 id="qtd_dias_trabalhados">0</h1>

                </div>

                <div class="card_kpi">

                    <div class="kpi_header">

                        <h3>Previsão Término</h3>

                        <span class="material-symbols-outlined" id="termino_">calendar_check</span>


                    </div>


                    <h1 id="termino">01/02/2026</h1>

                </div>

            </div>


            <div class="charts-container">

                <div style="display: flex;flex-direction: column; justify-content: space-between">

                    <div class="chart_card">

                        <h3>Prazo Da Obra</h3>

                        <div id="gauge" style="width:100%; height:150%;"></div>

                    </div>

                    <div class="chart_card">

                        <div id="map"></div>

                    </div>


                </div>

                <div style="display: flex; flex-direction: column; gap: 1.5rem">

                    <div class="chart_card" style="height:15vw; width:100%;">

                        <h3>Evolução Da Obra</h3>

                        <div id="line" style="width:100%;height:13vw;"></div>

                    </div>

                    <div class="chart_card">

                        <div id="tabela_etapas"></div>

                    </div>

                </div>


                <div style="display: flex;">


                    <div class="chart_card" style="height:auto; width:100%;">

                        <iframe title="Casa MV" frameborder="0" allowfullscreen mozallowfullscreen="false"
                            webkitallowfullscreen="false" allow="autoplay; fullscreen; xr-spatial-tracking"
                            xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share
                            src="https://sketchfab.com/models/a78d59cadbe34063bc950c1c30071430/embed"
                            style="height: 100%; width: 100%;"> </iframe>

                    </div>


                </div>



            </div>

        </main>

    </div>

</body>

<script>

    const sideMenu = document.querySelector('aside');
    const menuBtn = document.getElementById('menu-btn');
    const closeBtn = document.getElementById('close-btn');

    const darkMode = document.querySelector('.dark-mode');


    darkMode.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode-variables');
        darkMode.querySelector('span:nth-child(1)').classList.toggle('active');
    })



</script>

</html>
