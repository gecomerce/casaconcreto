<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img.png" type="image/x-icon">
    <title>Dashboard Financeiro</title>
</head>

<style>
    #map {
        width: 100%;
        height: 500px;
        border-radius: 12px;
    }
</style>

<body class="light-mode-variables">

    <div class="container">

        <aside>

            <div class="toggle">

                <div class="close" id="close-btn">
                    <span class="material-icons-sharp">
                        close
                    </span>
                </div>
            </div>

            <div class="sidebar">

                <div class="img-user">

                    <img src="logo.png" alt="">

                </div>

                <a href="index.html">
                    <span class="material-icons-sharp">
                        dashboard
                    </span>
                    <h3>Dashboard</h3>
                </a>

                <a href="/map.html" class="active">
                    <span class="material-icons-sharp">
                        map
                    </span>
                    <h3>Mapa</h3>
                </a>



                <a href="index.html" id="logout-btn" style="display: none;">
                    <span class="material-icons-sharp">
                        logout
                    </span>
                    <h3>Logout</h3>
                </a>
            </div>

        </aside>

        <main>


            <div class="header">

                <button id="menu-btn">
                    <span class="material-icons-sharp">
                        menu
                    </span>
                </button>

                <h1>Olá, Vagner</h1>

                <div class="datas">


                    <div>


                        <label>Obra: </label>

                        <select id="obra_selecionada">

                            <option value="Restinga">Cidade Jardim</option>
                            <option value="Jardim_arizona">Jardim Arizona</option>


                        </select>

                    </div>


                    <div class="dark-mode">

                        <span class="material-icons-sharp active">
                            brightness_medium
                        </span>

                    </div>

                </div>



            </div>

            <section class="map-section">

                <div id="map"></div>


            </section>



        </main>

    </div>

</body>

<script>

    const sideMenu = document.querySelector('aside');
    const menuBtn = document.getElementById('menu-btn');
    const closeBtn = document.getElementById('close-btn');

    const darkMode = document.querySelector('.dark-mode');

    menuBtn.addEventListener('click', () => {
        sideMenu.style.display = 'block';
    });

    closeBtn.addEventListener('click', () => {
        sideMenu.style.display = 'none';
    });

    darkMode.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode-variables');
        darkMode.querySelector('span:nth-child(1)').classList.toggle('active');
        darkMode.querySelector('span:nth-child(2)').classList.toggle('active');
    })


    // ====================================

    const latitude = -20.5373611;
    const longitude = -47.4548611;

    const map = L.map('map').setView([latitude, longitude], 5);


    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Lista de obras com coordenadas
    const obras = {
        Restinga: {
            nome: "Cidade Jardim - Restinga",
            coords: [-20.5938139, -47.4684872],
            popup: `
            <div style="text-align:center;">
                <h4>Cidade Jardim - Restinga</h4>
                <img src="./logo.png" style="width:100px; border-radius:50%;">
            </div>
        `
        },

        Jardim_arizona: {
            nome: "Jardim Arizona",
            coords: [-20.5349167, -47.45338897],
            popup: `
            <div style="text-align:center;">
                <h4>Jardim Arizona</h4>
                <img src="./logo.png" style="width:100px; border-radius:50%;">
            </div>
        `
        }
    };

    let marcadorAtual = null;

    function mostrarObraSelecionada() {
        const obra = document.getElementById("obra_selecionada").value;
        const dados = obras[obra];

        if (!dados) return;

        if (marcadorAtual) {
            map.removeLayer(marcadorAtual);
        }

        marcadorAtual = L.marker(dados.coords)
            .addTo(map)
            .bindPopup(dados.popup)
            .openPopup();

        map.setView(dados.coords, 12);
    }

    document.getElementById("obra_selecionada").addEventListener("change", mostrarObraSelecionada);

    // Executa ao carregar
    mostrarObraSelecionada();





</script>

</html>
